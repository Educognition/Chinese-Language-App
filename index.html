<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Chinese Tutor</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom selection color to match the theme */
        ::selection {
            background-color: #fecaca; /* red-200 */
            color: #1f2937; /* neutral-800 */
        }
    </style>
</head>
<body class="min-h-screen bg-neutral-50 text-neutral-800 font-sans">

    <!-- Header -->
    <header class="bg-red-600 text-white shadow-md p-4">
        <div class="max-w-4xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-6 h-6"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
                <h1 class="text-xl font-bold tracking-wide">Interactive Chinese Tutor</h1>
            </div>
        </div>
    </header>

    <main class="max-w-4xl mx-auto p-4 mt-6">
        
        <!-- Navigation Tabs -->
        <div class="flex justify-center gap-4 mb-6">
            <button id="tab-practice" class="flex items-center gap-2 px-6 py-3 rounded-full font-semibold transition-all shadow-sm bg-red-600 text-white shadow-md scale-105">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-5 h-5"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
                Phrase Practice
            </button>
            <button id="tab-quiz" class="flex items-center gap-2 px-6 py-3 rounded-full font-semibold transition-all shadow-sm bg-white text-neutral-600 hover:bg-neutral-100">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-5 h-5"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><path d="M12 17h.01"/></svg>
                Flashcard Quiz
            </button>
        </div>

        <!-- Global Study Mode Toggles -->
        <div class="flex flex-wrap justify-center gap-3 mb-8 w-full max-w-lg mx-auto">
            <button id="toggle-pinyin" class="flex items-center gap-2 px-4 py-2 rounded-full text-sm font-bold transition-all shadow-sm bg-white text-neutral-600 border border-neutral-200 hover:bg-neutral-50">
                <span id="icon-pinyin">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-4 h-4"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
                </span>
                <span id="text-pinyin">Hide Pinyin</span>
            </button>
            
            <button id="toggle-characters" class="flex items-center gap-2 px-4 py-2 rounded-full text-sm font-bold transition-all shadow-sm bg-white text-neutral-600 border border-neutral-200 hover:bg-neutral-50">
                <span id="icon-characters">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-4 h-4"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
                </span>
                <span id="text-characters">Hide Characters</span>
            </button>

            <button id="toggle-blind" class="flex items-center gap-2 px-4 py-2 rounded-full text-sm font-bold transition-all shadow-sm bg-white text-neutral-600 border border-neutral-200 hover:bg-neutral-50">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-4 h-4"><path d="M6 8.5a6.5 6.5 0 1 1 13 0c0 6-6 6-6 10a3.5 3.5 0 1 1-7 0"/><path d="M15 8.5a2.5 2.5 0 0 0-5 0v1a2 2 0 1 1 0 4"/></svg>
                <span id="text-blind">Blind Listening</span>
            </button>
        </div>

        <!-- ========================================== -->
        <!-- TAB 1: PRACTICE MODE -->
        <!-- ========================================== -->
        <div id="view-practice" class="flex flex-col items-center">
            
            <!-- Category Selector -->
            <div class="mb-4 w-full max-w-lg flex justify-between items-center bg-white p-2 rounded-xl shadow-sm border border-neutral-200">
                <select id="practice-select" class="w-full bg-transparent p-2 text-lg font-medium outline-none text-neutral-700 cursor-pointer"></select>
            </div>

            <!-- Controls -->
            <div class="flex justify-between w-full max-w-lg mb-4 px-2">
                <button id="practice-prev" class="flex items-center text-neutral-500 hover:text-neutral-800 disabled:opacity-30 font-medium py-1">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-5 h-5 mr-1"><path d="m15 18-6-6 6-6"/></svg> Previous
                </button>
                <button id="practice-next" class="flex items-center text-neutral-500 hover:text-neutral-800 disabled:opacity-30 font-medium py-1">
                    Next <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-5 h-5 ml-1"><path d="m9 18 6-6-6-6"/></svg>
                </button>
            </div>

            <!-- Flashcard Area -->
            <div class="bg-white rounded-3xl shadow-lg p-8 w-full max-w-lg text-center border-t-4 border-red-500 relative min-h-[300px] flex flex-col justify-center">
                <div id="practice-counter" class="absolute top-4 right-4 text-neutral-400 font-medium">1 / X</div>
                
                <div id="practice-peek-hint" class="absolute top-4 left-4 text-xs font-bold text-neutral-400 bg-neutral-100 px-2 py-1 rounded-md hidden">
                    Hover to peek 👀
                </div>

                <div class="space-y-4 my-8">
                    <p id="practice-en" class="text-xl font-medium transition-all duration-300 text-neutral-500"></p>
                    <h2 id="practice-zh" class="text-5xl font-bold transition-all duration-300 text-neutral-800"></h2>
                    <p id="practice-pinyin" class="text-2xl font-medium tracking-wide transition-all duration-300 text-red-600"></p>
                </div>

                <!-- Action Buttons -->
                <div class="flex justify-center gap-6 mt-4">
                    <button id="practice-play" class="bg-neutral-100 hover:bg-neutral-200 text-neutral-700 p-4 rounded-full transition-colors disabled:opacity-50 flex items-center justify-center shadow-sm" title="Listen">
                        <!-- SVG injected via JS -->
                    </button>
                    <button id="practice-mic" class="bg-red-600 hover:bg-red-700 text-white p-4 rounded-full transition-colors shadow-md disabled:opacity-80 flex items-center justify-center" title="Speak">
                        <!-- SVG injected via JS -->
                    </button>
                </div>
            </div>

            <!-- Feedback Area -->
            <div class="mt-6 min-h-[80px] text-center w-full max-w-lg">
                <div id="practice-error" class="text-red-500 font-medium bg-red-50 p-3 rounded-lg hidden"></div>
                <p id="practice-listening-status" class="text-neutral-500 font-medium animate-pulse hidden">Listening... (Speak Chinese)</p>
                
                <div id="practice-feedback-box" class="p-4 rounded-xl border transition-all hidden">
                    <div class="flex items-center justify-center gap-2 mb-2">
                        <div id="practice-feedback-icon"></div>
                        <span id="practice-feedback-title" class="font-bold"></span>
                    </div>
                    <p class="text-neutral-600 text-sm">You said: <span id="practice-recognized-text" class="font-semibold text-neutral-800 text-lg"></span></p>
                </div>
            </div>
        </div>

        <!-- ========================================== -->
        <!-- TAB 2: FLASHCARD QUIZ MODE -->
        <!-- ========================================== -->
        <div id="view-quiz" class="flex flex-col items-center hidden">
            
            <!-- Category Selector -->
            <div class="mb-4 w-full max-w-lg flex justify-between items-center bg-white p-2 rounded-xl shadow-sm border border-neutral-200">
                <select id="quiz-select" class="w-full bg-transparent p-2 text-lg font-medium outline-none text-neutral-700 cursor-pointer"></select>
            </div>

            <!-- Controls -->
            <div class="flex justify-between w-full max-w-lg mb-4 px-2">
                <button id="quiz-prev" class="flex items-center text-neutral-500 hover:text-neutral-800 disabled:opacity-30 font-medium py-1">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-5 h-5 mr-1"><path d="m15 18-6-6 6-6"/></svg> Previous
                </button>
                <button id="quiz-next" class="flex items-center text-neutral-500 hover:text-neutral-800 disabled:opacity-30 font-medium py-1">
                    Next <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-5 h-5 ml-1"><path d="m9 18 6-6-6-6"/></svg>
                </button>
            </div>

            <!-- Quiz Flashcard Area -->
            <div class="bg-white rounded-3xl shadow-lg p-8 w-full max-w-lg text-center border-t-4 border-blue-500 relative min-h-[300px] flex flex-col justify-center">
                <div id="quiz-counter" class="absolute top-4 right-4 text-neutral-400 font-medium">1 / X</div>

                <div id="quiz-peek-hint" class="absolute top-4 left-4 text-xs font-bold text-neutral-400 bg-neutral-100 px-2 py-1 rounded-md hidden">
                    Hover to peek 👀
                </div>

                <div class="space-y-4 my-8">
                    <h2 id="quiz-zh" class="text-5xl font-bold transition-all duration-300 text-neutral-800"></h2>
                    <p id="quiz-pinyin" class="text-2xl font-medium tracking-wide transition-all duration-300 text-blue-600"></p>
                    
                    <!-- Answer Reveal -->
                    <div id="quiz-answer-container" class="mt-6 transition-all duration-300 opacity-0">
                        <p class="text-xl text-neutral-600 font-bold border-t pt-4">Meaning: <span id="quiz-en"></span></p>
                    </div>
                </div>

                <!-- Action Buttons -->
                <div class="flex justify-center gap-6 mt-4">
                    <button id="quiz-play" class="bg-neutral-100 hover:bg-neutral-200 text-neutral-700 p-4 rounded-full transition-colors flex items-center justify-center shadow-sm" title="Listen to Chinese">
                        <!-- SVG injected -->
                    </button>
                    <button id="quiz-mic" class="bg-blue-600 hover:bg-blue-700 text-white p-4 rounded-full transition-colors shadow-md disabled:opacity-80 flex items-center justify-center" title="Speak English Meaning">
                        <!-- SVG injected -->
                    </button>
                    <button id="quiz-reveal" class="bg-neutral-100 hover:bg-neutral-200 text-neutral-700 p-4 rounded-full transition-colors flex items-center justify-center shadow-sm" title="Reveal Answer">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-8 h-8"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
                    </button>
                </div>
            </div>

            <!-- Quiz Feedback Area -->
            <div class="mt-6 min-h-[80px] text-center w-full max-w-lg">
                <div id="quiz-error" class="text-red-500 font-medium bg-red-50 p-3 rounded-lg hidden"></div>
                <p id="quiz-listening-status" class="text-neutral-500 font-medium animate-pulse hidden">Listening... (Speak English Meaning)</p>
                
                <div id="quiz-feedback-box" class="p-4 rounded-xl border transition-all hidden">
                    <div class="flex items-center justify-center gap-2 mb-2">
                        <div id="quiz-feedback-icon"></div>
                        <span id="quiz-feedback-title" class="font-bold"></span>
                    </div>
                    <p class="text-neutral-600 text-sm">You said: <span id="quiz-recognized-text" class="font-semibold text-neutral-800 text-lg"></span></p>
                </div>
            </div>
        </div>

    </main>

            x: `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-x-circle text-orange-500"><circle cx="12" cy="12" r="10"/><path d="m15 9-6 6"/><path d="m9 9 6 6"/></svg>`,
            eye: `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>`,
            eyeOff: `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" x2="22" y1="2" y2="22"/></svg>`
        };

        // --- UTILITIES ---
        const cleanChineseText = (text) => text.replace(/[.,!?，。！？()\sa-zA-Z]/g, '');
        const cleanEnglishText = (text) => text.toLowerCase().replace(/[.,!?/，。！？()[\]\s-]/g, '').trim();
        const shuffleArray = (array) => {
            const shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        };

        // --- STATE ---
        let state = {
            activeTab: 'practice',
            
            // Practice
            selectedDay: 'Monday',
            phraseIndex: 0,
            isPlayingAudio: false,
            isListening: false,
            recognizedText: "",
            feedbackState: null, // 'correct', 'incorrect'
            speechError: "",

            // Quiz
            quizCategory: 'Monday',
            quizIndex: 0,
            shuffledQuizPhrases: shuffleArray(studyData['Monday'].phrases),
            isQuizListening: false,
            quizRecognizedText: "",
            quizFeedback: null,
            showQuizAnswer: false,

            // Modes
            hidePinyin: false,
            hideCharacters: false,
            blindMode: false
        };

        // --- DOM ELEMENTS ---
        let els = {}; // Populated in init()

        // --- INITIALIZATION ---
        function init() {
            // Setup DOM Elements reference map
            els = {
                tabPractice: document.getElementById('tab-practice'),
                tabQuiz: document.getElementById('tab-quiz'),
                viewPractice: document.getElementById('view-practice'),
                viewQuiz: document.getElementById('view-quiz'),
                
                togglePinyin: document.getElementById('toggle-pinyin'),
                toggleCharacters: document.getElementById('toggle-characters'),
                toggleBlind: document.getElementById('toggle-blind'),
                textPinyin: document.getElementById('text-pinyin'),
                textCharacters: document.getElementById('text-characters'),
                textBlind: document.getElementById('text-blind'),
                iconPinyin: document.getElementById('icon-pinyin'),
                iconCharacters: document.getElementById('icon-characters'),

                // Practice
                pracSelect: document.getElementById('practice-select'),
                pracPrev: document.getElementById('practice-prev'),
                pracNext: document.getElementById('practice-next'),
                pracCounter: document.getElementById('practice-counter'),
                pracEn: document.getElementById('practice-en'),
                pracZh: document.getElementById('practice-zh'),
                pracPinyin: document.getElementById('practice-pinyin'),
                pracPlay: document.getElementById('practice-play'),
                pracMic: document.getElementById('practice-mic'),
                pracPeekHint: document.getElementById('practice-peek-hint'),
                pracError: document.getElementById('practice-error'),
                pracListenStat: document.getElementById('practice-listening-status'),
                pracFeedbackBox: document.getElementById('practice-feedback-box'),
                pracFeedbackIcon: document.getElementById('practice-feedback-icon'),
                pracFeedbackTitle: document.getElementById('practice-feedback-title'),
                pracRecognizedText: document.getElementById('practice-recognized-text'),

                // Quiz
                quizSelect: document.getElementById('quiz-select'),
                quizPrev: document.getElementById('quiz-prev'),
                quizNext: document.getElementById('quiz-next'),
                quizCounter: document.getElementById('quiz-counter'),
                quizZh: document.getElementById('quiz-zh'),
                quizPinyin: document.getElementById('quiz-pinyin'),
                quizEn: document.getElementById('quiz-en'),
                quizAnsCont: document.getElementById('quiz-answer-container'),
                quizPlay: document.getElementById('quiz-play'),
                quizMic: document.getElementById('quiz-mic'),
                quizReveal: document.getElementById('quiz-reveal'),
                quizPeekHint: document.getElementById('quiz-peek-hint'),
                quizError: document.getElementById('quiz-error'),
                quizListenStat: document.getElementById('quiz-listening-status'),
                quizFeedbackBox: document.getElementById('quiz-feedback-box'),
                quizFeedbackIcon: document.getElementById('quiz-feedback-icon'),
                quizFeedbackTitle: document.getElementById('quiz-feedback-title'),
                quizRecognizedText: document.getElementById('quiz-recognized-text'),
            };

            // Populate Selects
            const optionsHTML = Object.keys(studyData).map(day => `<option value="${day}">${studyData[day].title}</option>`).join('');
            els.pracSelect.innerHTML = optionsHTML;
            els.quizSelect.innerHTML = optionsHTML;
            
            // Set static button icons
            els.pracPlay.innerHTML = svgs.play;
            els.pracMic.innerHTML = svgs.mic;
            els.quizPlay.innerHTML = svgs.play;
            els.quizMic.innerHTML = svgs.mic;

            setupEventListeners();
            render();
        }

        // --- EVENT LISTENERS ---
        function setupEventListeners() {
            // Tabs
            els.tabPractice.addEventListener('click', () => { state.activeTab = 'practice'; render(); });
            els.tabQuiz.addEventListener('click', () => { state.activeTab = 'quiz'; render(); });

            // Toggles
            els.togglePinyin.addEventListener('click', () => {
                state.hidePinyin = !state.hidePinyin;
                if (state.blindMode) state.blindMode = false;
                render();
            });
            els.toggleCharacters.addEventListener('click', () => {
                state.hideCharacters = !state.hideCharacters;
                if (state.blindMode) state.blindMode = false;
                render();
            });
            els.toggleBlind.addEventListener('click', () => {
                state.blindMode = !state.blindMode;
                if (state.blindMode) {
                    state.hidePinyin = true;
                    state.hideCharacters = true;
                }
                render();
            });

            // Practice Controls
            els.pracSelect.addEventListener('change', (e) => {
                state.selectedDay = e.target.value;
                state.phraseIndex = 0;
                state.feedbackState = null;
                state.recognizedText = "";
                render();
            });
            els.pracPrev.addEventListener('click', () => {
                if (state.phraseIndex > 0) {
                    state.phraseIndex--;
                    state.feedbackState = null;
                    state.recognizedText = "";
                    render();
                }
            });
            els.pracNext.addEventListener('click', () => {
                if (state.phraseIndex < studyData[state.selectedDay].phrases.length - 1) {
                    state.phraseIndex++;
                    state.feedbackState = null;
                    state.recognizedText = "";
                    render();
                }
            });
            els.pracPlay.addEventListener('click', playPracticeAudio);
            els.pracMic.addEventListener('click', startPracticeListening);

            // Quiz Controls
            els.quizSelect.addEventListener('change', (e) => {
                state.quizCategory = e.target.value;
                state.shuffledQuizPhrases = shuffleArray(studyData[state.quizCategory].phrases);
                state.quizIndex = 0;
                state.quizFeedback = null;
                state.quizRecognizedText = "";
                state.showQuizAnswer = false;
                render();
            });
            els.quizPrev.addEventListener('click', () => {
                if (state.quizIndex > 0) {
                    state.quizIndex--;
                    state.quizFeedback = null;
                    state.quizRecognizedText = "";
                    state.showQuizAnswer = false;
                    render();
                }
            });
            els.quizNext.addEventListener('click', () => {
                if (state.quizIndex < state.shuffledQuizPhrases.length - 1) {
                    state.quizIndex++;
                    state.quizFeedback = null;
                    state.quizRecognizedText = "";
                    state.showQuizAnswer = false;
                    render();
                }
            });
            els.quizPlay.addEventListener('click', playQuizAudio);
            els.quizMic.addEventListener('click', startQuizListening);
            els.quizReveal.addEventListener('click', () => {
                state.showQuizAnswer = true;
                render();
            });
        }

        // --- LOGIC FUNCTIONS ---

        // Speech Synthesis
        function playPracticeAudio() {
            if (state.isPlayingAudio) return;
            if (!window.speechSynthesis) {
                state.speechError = "Text-to-speech is not supported in this browser.";
                render();
                return;
            }

            state.isPlayingAudio = true;
            state.speechError = "";
            render();

            window.speechSynthesis.cancel();
            const currentPhrase = studyData[state.selectedDay].phrases[state.phraseIndex];
            const utZh = new SpeechSynthesisUtterance(currentPhrase.zh);
            utZh.lang = 'zh-CN';
            utZh.rate = 0.85;

            utZh.onend = () => { state.isPlayingAudio = false; render(); };
            utZh.onerror = () => { state.isPlayingAudio = false; render(); };

            window.speechSynthesis.speak(utZh);
        }

        function playQuizAudio() {
            if (!window.speechSynthesis) return;
            window.speechSynthesis.cancel();
            const currentQuizPhrase = state.shuffledQuizPhrases[state.quizIndex];
            const utZh = new SpeechSynthesisUtterance(currentQuizPhrase.zh);
            utZh.lang = 'zh-CN';
            utZh.rate = 0.85;
            window.speechSynthesis.speak(utZh);
        }

        // Speech Recognition
        function startPracticeListening() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                state.speechError = "Speech recognition is not supported. Try Chrome or Edge.";
                render();
                return;
            }

            const recognition = new SpeechRecognition();
            recognition.lang = 'zh-CN';
            recognition.interimResults = false;
            recognition.maxAlternatives = 1;

            recognition.onstart = () => {
                state.isListening = true;
                state.recognizedText = "";
                state.feedbackState = null;
                state.speechError = "";
                render();
            };

            recognition.onresult = (event) => {
                const speechResult = event.results[0][0].transcript;
                state.recognizedText = speechResult;
                
                const currentPhrase = studyData[state.selectedDay].phrases[state.phraseIndex];
                const targetClean = cleanChineseText(currentPhrase.zh);
                const spokenClean = cleanChineseText(speechResult);
                
                if (spokenClean.includes(targetClean) || (targetClean.includes(spokenClean) && spokenClean.length > 0)) {
                    state.feedbackState = 'correct';
                } else {
                    state.feedbackState = 'incorrect';
                }
            };

            recognition.onerror = (event) => {
                state.speechError = `Microphone error: ${event.error}`;
                state.isListening = false;
                render();
            };

            recognition.onend = () => {
                state.isListening = false;
                render();
            };

            recognition.start();
        }

        function startQuizListening() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                state.speechError = "Speech recognition is not supported.";
                render();
                return;
            }

            const recognition = new SpeechRecognition();
            recognition.lang = 'en-US';
            recognition.interimResults = false;
            recognition.maxAlternatives = 1;

            recognition.onstart = () => {
                state.isQuizListening = true;
                state.quizRecognizedText = "";
                state.quizFeedback = null;
                state.speechError = "";
                render();
            };

            recognition.onresult = (event) => {
                const speechResult = event.results[0][0].transcript;
                state.quizRecognizedText = speechResult;
                
                const currentQuizPhrase = state.shuffledQuizPhrases[state.quizIndex];
                const targetClean = cleanEnglishText(currentQuizPhrase.en);
                const spokenClean = cleanEnglishText(speechResult);
                
                if (spokenClean.includes(targetClean) || (targetClean.includes(spokenClean) && spokenClean.length > 0)) {
                    state.quizFeedback = 'correct';
                    state.showQuizAnswer = true;
                } else {
                    state.quizFeedback = 'incorrect';
                }
            };

            recognition.onerror = (event) => {
                state.speechError = `Microphone error: ${event.error}`;
                state.isQuizListening = false;
                render();
            };

            recognition.onend = () => {
                state.isQuizListening = false;
                render();
            };

            recognition.start();
        }

        // --- RENDER (DOM UPDATE) ---
        function render() {
            // Update Tabs UI
            if (state.activeTab === 'practice') {
                els.tabPractice.className = "flex items-center gap-2 px-6 py-3 rounded-full font-semibold transition-all shadow-sm bg-red-600 text-white shadow-md scale-105";
                els.tabQuiz.className = "flex items-center gap-2 px-6 py-3 rounded-full font-semibold transition-all shadow-sm bg-white text-neutral-600 hover:bg-neutral-100";
                els.viewPractice.classList.remove('hidden');
                els.viewQuiz.classList.add('hidden');
            } else {
                els.tabPractice.className = "flex items-center gap-2 px-6 py-3 rounded-full font-semibold transition-all shadow-sm bg-white text-neutral-600 hover:bg-neutral-100";
                els.tabQuiz.className = "flex items-center gap-2 px-6 py-3 rounded-full font-semibold transition-all shadow-sm bg-red-600 text-white shadow-md scale-105";
                els.viewPractice.classList.add('hidden');
                els.viewQuiz.classList.remove('hidden');
            }

            // Update Toggles UI
            els.togglePinyin.className = `flex items-center gap-2 px-4 py-2 rounded-full text-sm font-bold transition-all shadow-sm ${state.hidePinyin ? 'bg-neutral-800 text-white' : 'bg-white text-neutral-600 border border-neutral-200 hover:bg-neutral-50'}`;
            els.toggleCharacters.className = `flex items-center gap-2 px-4 py-2 rounded-full text-sm font-bold transition-all shadow-sm ${state.hideCharacters ? 'bg-neutral-800 text-white' : 'bg-white text-neutral-600 border border-neutral-200 hover:bg-neutral-50'}`;
            els.toggleBlind.className = `flex items-center gap-2 px-4 py-2 rounded-full text-sm font-bold transition-all shadow-sm ${state.blindMode ? 'bg-indigo-600 text-white shadow-md scale-105' : 'bg-white text-neutral-600 border border-neutral-200 hover:bg-neutral-50'}`;
            
            // Swap icons safely
            els.iconPinyin.innerHTML = state.hidePinyin ? svgs.eyeOff : svgs.eye;
            els.iconCharacters.innerHTML = state.hideCharacters ? svgs.eyeOff : svgs.eye;

            els.textPinyin.textContent = state.hidePinyin ? 'Pinyin Hidden' : 'Hide Pinyin';
            els.textCharacters.textContent = state.hideCharacters ? 'Characters Hidden' : 'Hide Characters';
            els.textBlind.textContent = state.blindMode ? 'Blind Mode ON' : 'Blind Listening';

            // Show Peek Hint globally if needed
            const showHint = state.hidePinyin || state.hideCharacters || state.blindMode;
            els.pracPeekHint.classList.toggle('hidden', !showHint);
            els.quizPeekHint.classList.toggle('hidden', !showHint);

            // --- PRACTICE RENDER ---
            if (state.activeTab === 'practice') {
                const currentPhraseList = studyData[state.selectedDay].phrases;
                const phrase = currentPhraseList[state.phraseIndex];
                
                els.pracSelect.value = state.selectedDay;
                els.pracCounter.textContent = `${state.phraseIndex + 1} / ${currentPhraseList.length}`;
                els.pracPrev.disabled = state.phraseIndex === 0;
                els.pracNext.disabled = state.phraseIndex === currentPhraseList.length - 1;

                els.pracEn.textContent = phrase.en;
                els.pracZh.textContent = phrase.zh;
                els.pracPinyin.textContent = phrase.pinyin;

                els.pracEn.className = `text-xl font-medium transition-all duration-300 ${state.blindMode ? 'blur-md opacity-30 hover:blur-none hover:opacity-100 cursor-pointer select-none text-neutral-800' : 'text-neutral-500'}`;
                els.pracZh.className = `text-5xl font-bold transition-all duration-300 ${state.hideCharacters || state.blindMode ? 'blur-md opacity-30 hover:blur-none hover:opacity-100 cursor-pointer select-none text-neutral-800' : 'text-neutral-800'}`;
                els.pracPinyin.className = `text-2xl font-medium tracking-wide transition-all duration-300 ${state.hidePinyin || state.blindMode ? 'blur-md opacity-30 hover:blur-none hover:opacity-100 cursor-pointer select-none text-red-800' : 'text-red-600'}`;

                els.pracPlay.disabled = state.isPlayingAudio;
                els.pracMic.disabled = state.isListening;
                els.pracMic.className = `${state.isListening ? 'bg-red-500 animate-pulse text-white' : 'bg-red-600 hover:bg-red-700 text-white'} p-4 rounded-full transition-colors shadow-md disabled:opacity-80 flex items-center justify-center`;

                // Errors & Feedback
                if (state.speechError) {
                    els.pracError.textContent = state.speechError;
                    els.pracError.classList.remove('hidden');
                } else {
                    els.pracError.classList.add('hidden');
                }

                els.pracListenStat.classList.toggle('hidden', !state.isListening);
                
                if (!state.isListening && state.recognizedText) {
                    els.pracFeedbackBox.classList.remove('hidden');
                    els.pracRecognizedText.textContent = state.recognizedText;
                    if (state.feedbackState === 'correct') {
                        els.pracFeedbackBox.className = "p-4 rounded-xl border bg-green-50 border-green-200 transition-all";
                        els.pracFeedbackIcon.innerHTML = svgs.check;
                        els.pracFeedbackTitle.textContent = "Excellent!";
                        els.pracFeedbackTitle.className = "font-bold text-green-700";
                    } else {
                        els.pracFeedbackBox.className = "p-4 rounded-xl border bg-orange-50 border-orange-200 transition-all";
                        els.pracFeedbackIcon.innerHTML = svgs.x;
                        els.pracFeedbackTitle.textContent = "Almost! Try again.";
                        els.pracFeedbackTitle.className = "font-bold text-orange-700";
                    }
                } else {
                    els.pracFeedbackBox.classList.add('hidden');
                }
            }

            // --- QUIZ RENDER ---
            if (state.activeTab === 'quiz') {
                const phrase = state.shuffledQuizPhrases[state.quizIndex];
                
                els.quizSelect.value = state.quizCategory;
                els.quizCounter.textContent = `${state.quizIndex + 1} / ${state.shuffledQuizPhrases.length}`;
                els.quizPrev.disabled = state.quizIndex === 0;
                els.quizNext.disabled = state.quizIndex === state.shuffledQuizPhrases.length - 1;

                els.quizZh.textContent = phrase.zh;
                els.quizPinyin.textContent = phrase.pinyin;
                els.quizEn.textContent = phrase.en;

                els.quizZh.className = `text-5xl font-bold transition-all duration-300 ${state.hideCharacters || state.blindMode ? 'blur-md opacity-30 hover:blur-none hover:opacity-100 cursor-pointer select-none text-neutral-800' : 'text-neutral-800'}`;
                els.quizPinyin.className = `text-2xl font-medium tracking-wide transition-all duration-300 ${state.hidePinyin || state.blindMode ? 'blur-md opacity-30 hover:blur-none hover:opacity-100 cursor-pointer select-none text-blue-800' : 'text-blue-600'}`;

                els.quizAnsCont.className = `mt-6 transition-all duration-300 ${state.showQuizAnswer ? 'opacity-100' : 'opacity-0'}`;
                
                els.quizMic.disabled = state.isQuizListening;
                els.quizMic.className = `${state.isQuizListening ? 'bg-blue-500 animate-pulse text-white' : 'bg-blue-600 hover:bg-blue-700 text-white'} p-4 rounded-full transition-colors shadow-md disabled:opacity-80 flex items-center justify-center`;
                els.quizReveal.classList.toggle('hidden', state.showQuizAnswer);

                // Errors & Feedback
                if (state.speechError) {
                    els.quizError.textContent = state.speechError;
                    els.quizError.classList.remove('hidden');
                } else {
                    els.quizError.classList.add('hidden');
                }

                els.quizListenStat.classList.toggle('hidden', !state.isQuizListening);

                if (!state.isQuizListening && state.quizRecognizedText) {
                    els.quizFeedbackBox.classList.remove('hidden');
                    els.quizRecognizedText.textContent = state.quizRecognizedText;
                    if (state.quizFeedback === 'correct') {
                        els.quizFeedbackBox.className = "p-4 rounded-xl border bg-green-50 border-green-200 transition-all";
                        els.quizFeedbackIcon.innerHTML = svgs.check;
                        els.quizFeedbackTitle.textContent = "Correct!";
                        els.quizFeedbackTitle.className = "font-bold text-green-700";
                    } else {
                        els.quizFeedbackBox.className = "p-4 rounded-xl border bg-orange-50 border-orange-200 transition-all";
                        els.quizFeedbackIcon.innerHTML = svgs.x;
                        els.quizFeedbackTitle.textContent = "Not quite.";
                        els.quizFeedbackTitle.className = "font-bold text-orange-700";
                    }
                } else {
                    els.quizFeedbackBox.classList.add('hidden');
                }
            }
        }

        // Wait for the DOM to be fully loaded before triggering our script
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
